version: "3.8"

services:
  # Backend Service
  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: smartpos-backend
    restart: unless-stopped
    env_file:
      - ./BE/.env
    environment:
      - NODE_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8081
    ports:
      - "8081:8081"
    expose:
      - "8081"
    volumes:
      - backend-logs:/app/logs
    networks:
      - smartpos-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8081/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  # Frontend Service
  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8081/v1
    container_name: smartpos-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8081/v1
    ports:
      - "3000:3000"
    expose:
      - "3000"
    networks:
      - smartpos-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: smartpos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx-logs:/var/log/nginx
    networks:
      - smartpos-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  backend-logs:
    driver: local
  nginx-logs:
    driver: local

networks:
  smartpos-network:
    driver: bridge
